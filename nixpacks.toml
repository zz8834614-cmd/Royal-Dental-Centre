[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9 && pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/dental-clinic run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"
